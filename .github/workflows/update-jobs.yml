name: 更新招考信息并部署网站

on:
  push:
    branches: [main, master]
  schedule:
    - cron: "20 23 * * *"
  workflow_dispatch:

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  refresh-and-build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: 检出仓库
        uses: actions/checkout@v5

      - name: 配置 Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: 运行采集器测试
        run: python -m unittest discover -s tests -p "test_*.py" -v

      - name: 运行前端逻辑测试
        run: node --test tests/core.test.mjs

      - name: 更新招聘数据
        run: python crawler/crawl.py --config crawler/sources.json --output data/jobs.json --health-output data/health.json

      - name: 检查数据快照质量
        run: python scripts/check_snapshot.py --jobs data/jobs.json --health data/health.json

      - name: 保存最新数据快照
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/jobs.json data/health.json crawler/cache/details.json
          git diff --cached --quiet || git commit -m "data: refresh recruitment listings"
          git push origin "HEAD:${GITHUB_REF_NAME}"

      - name: 组装静态网站
        shell: bash
        run: |
          mkdir -p _site
          cp index.html _site/
          cp -r assets data _site/
          touch _site/.nojekyll

      - name: 上传 Pages 构建产物
        uses: actions/upload-pages-artifact@v5
        with:
          path: _site

  deploy:
    needs: refresh-and-build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    outputs:
      page_url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: 部署到 GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5

  public-smoke:
    needs: deploy
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: 检出仓库
        uses: actions/checkout@v5

      - name: 配置 Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: 检查公网首页和数据
        run: python scripts/check_public_site.py --base-url "${{ needs.deploy.outputs.page_url }}"
